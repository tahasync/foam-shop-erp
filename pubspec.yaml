name: foam_shop_register
description: "Foam Shop - Digital Register"
publish_to: 'none'
version: 1.5.5+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^3.3.0
  firebase_core: ^4.12.1
  firebase_auth: ^6.5.6
  google_sign_in: ^7.2.0
  cloud_firestore: ^6.7.1
  firebase_crashlytics: ^5.2.6
  firebase_performance: ^0.11.4+5
  fl_chart: ^1.2.0
  pdf: ^3.13.0
  printing: ^5.15.0
  intl: ^0.20.0
  share_plus: ^13.3.0
  path_provider: ^2.1.6
  google_fonts: ^8.2.0
  shimmer: ^3.0.0
  flutter_animate: ^4.5.2
  flutter_svg: ^2.0.0
  shared_preferences: ^2.3.3
  csv: ^6.0.0
  excel: ^4.0.6
  http: ^1.6.0
  package_info_plus: ^10.2.1
  url_launcher: ^6.3.2
  permission_handler: ^11.3.0
  file_saver: ^0.2.14

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "foam-shop-icon-preview.png"
  remove_alpha_ios: true

flutter:
  uses-material-design: true
  assets:
    - assets/logo.svg
