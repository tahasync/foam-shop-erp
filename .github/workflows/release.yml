name: Build & Deploy Open Source Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository Codebase
        uses: actions/checkout@v4

      - name: Setup Java Development Kit
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter Engine Environment
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          architecture: x64

      - name: Decode Firebase Android Config
        run: |
          echo "${{ secrets.GOOGLE_SERVICES_JSON }}" | base64 --decode > android/app/google-services.json

      - name: Write Firebase Config
        run: |
          mkdir -p env
          echo '${{ secrets.FIREBASE_CONFIG_JSON }}' > env/firebase_config.json

      - name: Decode Release Keystore
        run: echo "${{ secrets.RELEASE_KEYSTORE_BASE64 }}" | base64 --decode > android/app/release.keystore

      - name: Install Project Dependencies
        run: flutter pub get

      - name: Compile Split ABI APKs
        run: flutter build apk --release --split-per-abi --dart-define-from-file=env/firebase_config.json
        env:
          KEYSTORE_PATH: release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}

      - name: Compile Universal APK
        run: flutter build apk --release --dart-define-from-file=env/firebase_config.json
        env:
          KEYSTORE_PATH: release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}

      - name: Generate Global Production Release Artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
            build/app/outputs/flutter-apk/app-x86_64-release.apk
            build/app/outputs/flutter-apk/app-release.apk
          body: |
            ## APK Downloads

            - **app-release.apk** — Universal (works on all devices, ~60MB)
            - **app-arm64-v8a-release.apk** — 64-bit ARM (most modern phones)
            - **app-armeabi-v7a-release.apk** — 32-bit ARM (older phones)
            - **app-x86_64-release.apk** — x86 emulators

            Download the universal APK if you're unsure which one to pick.
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
