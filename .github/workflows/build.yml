name: Build APK

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.44.6'
          architecture: x64
          cache: true

      - name: Decode Firebase google-services.json
        run: |
          echo "${{ secrets.GOOGLE_SERVICES_JSON }}" | base64 --decode > android/app/google-services.json
          echo "::notice ::Package names in google-services.json:"
          grep -o '"package_name"[[:space:]]*:[[:space:]]*"[^"]*"' android/app/google-services.json || echo "  (no android client entries found)"

      - name: Write Firebase dart-define config
        run: |
          mkdir -p env
          cat > env/firebase_config.json << 'FIREOF'
          ${{ secrets.FIREBASE_CONFIG_JSON }}
          FIREOF
          echo "::notice ::firebase_config.json fields:"
          grep -o '"[A-Z_]*"' env/firebase_config.json | head -20

      - name: Decode Release Keystore
        run: |
          echo "${{ secrets.RELEASE_KEYSTORE_BASE64 }}" | base64 --decode > android/app/release.keystore
          echo "::notice ::Keystore decoded ($(wc -c < android/app/release.keystore) bytes)"

      - name: Validate google-services.json matches applicationId
        run: |
          APP_ID="com.asif.foamshop"
          if grep -q "\"$APP_ID\"" android/app/google-services.json; then
            echo "::notice ::google-services.json contains client for $APP_ID — OK"
          else
            echo "::error ::google-services.json has NO client for $APP_ID — update GOOGLE_SERVICES_JSON secret"
            exit 1
          fi

      - name: Inject Version & Build Universal APK
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            VERSION_NAME="${GITHUB_REF_NAME#v}"
            echo "::notice ::Building Tagged Release: $VERSION_NAME (Build: ${{ github.run_number }})"
            sed -i -E "s/^version: .*/version: ${VERSION_NAME}+${{ github.run_number }}/" pubspec.yaml
            flutter clean
            flutter pub get
            flutter build apk --release \
              --build-name="$VERSION_NAME" \
              --build-number=${{ github.run_number }} \
              --dart-define-from-file=env/firebase_config.json
          else
            echo "::notice ::Building Main Commit (Build: ${{ github.run_number }})"
            flutter clean
            flutter pub get
            flutter build apk --release \
              --build-number=${{ github.run_number }} \
              --dart-define-from-file=env/firebase_config.json
          fi
        env:
          KEYSTORE_PATH: release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}

      - name: Upload APK to Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
          overwrite: true

      - name: Attach APK to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: build/app/outputs/flutter-apk/app-release.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}