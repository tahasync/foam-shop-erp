org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
# Enable new DSL (required by built-in Kotlin)
android.newDsl=true
# Enable Flutter's built-in Kotlin support — resolves KGP conflicts from plugins
# like firebase_performance that apply Kotlin Gradle Plugin themselves.
# Requires Flutter 3.22+ (current: 3.29.0) and Kotlin 1.9.20+ (current: 2.3.20).
android.builtInKotlin=true
kotlin.stdlib.default.use=true
